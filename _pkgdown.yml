reference:
- subtitle: Read 
  desc: reading raw data files
  contents:
  - starts_with("read")
  

  
- subtitle: Analyse
  desc: add cursors that perform analysis on your data
  contents:
  - contains("cursor")
  
- subtitle: Plot
  desc: make ggPlots of your data
  contents:
  - starts_with("gg")   
  
- subtitle: Drc
  desc: doing dose response analysis
  contents:
  - starts_with("drc")

- subtitle: Misc
  desc: doing dose response analysis
  contents:
